name: lumio

# Local development stack. Production runs on Supabase.
# Spin up: `docker compose up -d`
# Tear down: `docker compose down -v`

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - lumio-pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumio-pgdata:
    driver: local